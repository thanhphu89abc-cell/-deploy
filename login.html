<!doctype html>
<html lang="vi" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - Coursera Advanced</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600;700;900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="coursera-style.css" />
  </head>
  <body
    class="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-[#0B0F19] transition-colors duration-300 px-4 font-['Source_Sans_Pro']"
  >
    <div
      class="max-w-md w-full bg-white dark:bg-slate-900 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] dark:shadow-none border border-gray-100 dark:border-slate-800 p-8 animate-fade-in-up"
    >
      <div class="text-center mb-8">
        <h1 class="text-3xl font-black text-[#0056D2] tracking-tight mb-2">
          coursera
        </h1>
        <p class="text-gray-500 dark:text-gray-400 font-semibold">
          Đăng nhập để tiếp tục quá trình học
        </p>
      </div>

      <form id="login-form" class="space-y-5">
        <div>
          <label
            class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1.5"
            >Email</label
          >
          <div class="relative">
            <div
              class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
            >
              <i class="fa-regular fa-envelope text-gray-400"></i>
            </div>
            <input
              id="email-input"
              type="email"
              placeholder="student@example.com"
              class="w-full pl-10 pr-4 py-2.5 bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-[#0056D2]/20 focus:border-[#0056D2] dark:focus:ring-blue-500/20 text-gray-900 dark:text-white outline-none transition-all"
              required
            />
          </div>
        </div>

        <div>
          <div class="flex items-center justify-between mb-1.5">
            <label
              class="block text-sm font-bold text-gray-700 dark:text-gray-300"
              >Mật khẩu</label
            >
            <a
              href="forgot-password.html"
              class="text-xs font-bold text-[#0056D2] hover:text-blue-700 dark:text-blue-400"
              >Quên mật khẩu?</a
            >
          </div>
          <div class="relative">
            <div
              class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
            >
              <i class="fa-solid fa-lock text-gray-400"></i>
            </div>
            <input
              id="password-input"
              type="password"
              placeholder="••••••••"
              class="w-full pl-10 pr-4 py-2.5 bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-[#0056D2]/20 focus:border-[#0056D2] dark:focus:ring-blue-500/20 text-gray-900 dark:text-white outline-none transition-all"
              required
            />
          </div>
        </div>

        <div class="flex items-center">
          <input
            id="remember-me"
            type="checkbox"
            class="h-4 w-4 text-[#0056D2] focus:ring-[#0056D2] border-gray-300 rounded cursor-pointer"
          />
          <label
            for="remember-me"
            class="ml-2 block text-sm text-gray-600 dark:text-gray-400 cursor-pointer"
          >
            Ghi nhớ đăng nhập
          </label>
        </div>

        <button
          id="submit-btn"
          type="submit"
          class="w-full bg-[#0056D2] hover:bg-blue-700 text-white font-bold py-2.5 rounded-xl transition-colors shadow-sm flex justify-center items-center"
        >
          <span>Đăng nhập</span>
        </button>

        <div
          id="error-msg"
          class="hidden mt-3 text-center text-sm text-red-500 font-bold"
        ></div>
      </form>

      <div
        class="mt-6 text-center text-sm text-gray-600 dark:text-gray-400 font-medium"
      >
        Chưa có tài khoản?
        <a
          href="register.html"
          class="text-[#0056D2] dark:text-blue-400 font-bold hover:underline"
          >Đăng ký ngay</a
        >
      </div>
    </div>

    <script>
      // Thêm từ khóa 'async' để có thể dùng 'await fetch'
      document
        .getElementById("login-form")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const email = document.getElementById("email-input").value.trim();
          const password = document.getElementById("password-input").value;
          const btn = document.getElementById("submit-btn");
          const errorMsg = document.getElementById("error-msg");

          errorMsg.classList.add("hidden");

          // Giao diện nút Loading
          const originalText = btn.innerHTML;
          btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Đang xử lý...`;
          btn.disabled = true;
          btn.classList.add("opacity-75", "cursor-not-allowed");

          try {
            // GỌI API BACKEND THỰC TẾ
            const response = await fetch("login.php", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email: email, password: password }),
            });

            // ✅ Đọc raw text trước để debug
            const rawText = await response.text();
            console.log("RAW RESPONSE:", rawText); // Xem trong F12 > Console

            // Sau đó mới parse JSON
            let result;
            try {
              result = JSON.parse(rawText);
              
              // --- ĐOẠN CODE ĐƯỢC THÊM VÀO ĐỂ FIX LỖI MẢNG ---
              if (Array.isArray(result)) {
                  result = result[0];
              }
              // ----------------------------------------------
              
            } catch (parseErr) {
              throw new Error(
                `Server trả về không phải JSON: "${rawText.substring(0, 200)}"`,
              );
            }

            if (response.ok) {
              // Đăng nhập đúng -> Lưu token và email vào LocalStorage
              localStorage.setItem(
                "coursera_user_session",
                JSON.stringify({
                  email: result.user.email,
                  fullname: result.user.fullname, // <--- Đổi chữ fullname cuối cùng thành username
                  role: result.user.role,
                  token: result.token,
                }),
              );

              // Chuyển hướng sang trang học (index.html)
              window.location.href = "coursera-index.html";
            } else {
              // Sai mật khẩu hoặc email
              btn.innerHTML = originalText;
              btn.disabled = false;
              btn.classList.remove("opacity-75", "cursor-not-allowed");

              errorMsg.innerText =
                result.message || "Email hoặc mật khẩu không hợp lệ.";
              errorMsg.classList.remove("hidden");
            }
          } catch (error) {
            console.error(error);
            // Lỗi sập server hoặc chưa bật Python
            btn.innerHTML = originalText;
            btn.disabled = false;
            btn.classList.remove("opacity-75", "cursor-not-allowed");

            errorMsg.innerText =
              "Chi tiết lỗi: " + error.message + " (Nhấn F12 để xem thêm)";
            errorMsg.classList.remove("hidden");
          }
        });
    </script>
  </body>
</html>
