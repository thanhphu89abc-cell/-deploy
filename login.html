<!doctype html>
<html lang="vi" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập - Coursera Advanced</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: "class" };</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Source Sans Pro', sans-serif; }
    .animate-fade-in-up { animation: fadeInUp 0.6s ease-out forwards; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 flex items-center justify-center min-h-screen p-4 text-gray-900 dark:text-gray-100">

  <div class="w-full max-w-md bg-white dark:bg-[#0B0F19] rounded-3xl shadow-xl border border-gray-100 dark:border-slate-800 p-8 animate-fade-in-up relative overflow-hidden">
    <div class="absolute -top-24 -right-24 w-48 h-48 bg-blue-500/10 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-blue-500/10 rounded-full blur-3xl"></div>

    <div class="relative z-10">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-black text-[#0056D2] tracking-tight dark:text-blue-500 mb-2">Coursera</h1>
        <h2 class="text-xl font-bold text-gray-800 dark:text-white">Chào mừng trở lại</h2>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Vui lòng đăng nhập để tiếp tục học tập</p>
      </div>

      <div id="error-message" class="hidden mb-6 p-4 rounded-xl bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 text-sm font-bold flex items-start gap-3 border border-red-100 dark:border-red-900/30">
        <i class="fa-solid fa-circle-exclamation mt-0.5"></i>
        <span id="error-text">Email hoặc mật khẩu không đúng!</span>
      </div>

      <form id="login-form" class="space-y-5">
        <div>
          <label for="email" class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1.5">Email của bạn</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <i class="fa-solid fa-envelope text-gray-400"></i>
            </div>
            <input type="email" id="email" name="email" required placeholder="name@example.com" class="w-full pl-11 pr-4 py-3 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-[#0056D2]/20 focus:border-[#0056D2] outline-none text-gray-900 dark:text-white transition-all text-sm font-medium">
          </div>
        </div>

        <div>
          <div class="flex items-center justify-between mb-1.5">
            <label for="password" class="block text-sm font-bold text-gray-700 dark:text-gray-300">Mật khẩu</label>
            <a href="forgot_password.html" class="text-sm font-bold text-[#0056D2] dark:text-blue-400 hover:underline">Quên mật khẩu?</a>
          </div>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <i class="fa-solid fa-lock text-gray-400"></i>
            </div>
            <input type="password" id="password" name="password" required placeholder="••••••••" class="w-full pl-11 pr-10 py-3 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-[#0056D2]/20 focus:border-[#0056D2] outline-none text-gray-900 dark:text-white transition-all text-sm font-medium">
            <button type="button" id="toggle-password" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600 focus:outline-none">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="flex items-center justify-between pt-1">
          <label class="flex items-center gap-2 cursor-pointer group">
            <input type="checkbox" class="w-4 h-4 text-[#0056D2] bg-gray-50 border-gray-300 rounded focus:ring-[#0056D2] dark:bg-slate-900 dark:border-slate-700">
            <span class="text-sm font-medium text-gray-600 dark:text-gray-400 group-hover:text-gray-900 dark:group-hover:text-white transition-colors">Ghi nhớ đăng nhập</span>
          </label>
        </div>

        <button type="submit" id="submit-btn" class="w-full bg-[#0056D2] hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg hover:shadow-blue-500/30 flex items-center justify-center gap-2 mt-4">
          <span>Đăng nhập</span>
          <i class="fa-solid fa-arrow-right text-sm"></i>
        </button>
        
        <div class="flex items-center gap-4 mt-6">
          <div class="flex-1 h-px bg-gray-200 dark:bg-slate-800"></div>
          <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Hoặc</span>
          <div class="flex-1 h-px bg-gray-200 dark:bg-slate-800"></div>
        </div>

        <div id="g_id_onload"
             data-client_id="1012131444928-fh1rgie6iefocoqrjlmvk46v3op202hm.apps.googleusercontent.com"
             data-callback="handleGoogleLogin"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin flex justify-center"
             data-type="standard"
             data-size="large"
             data-theme="outline"
             data-text="signin_with"
             data-shape="rectangular"
             data-logo_alignment="left">
        </div>
      </form>

      <div class="mt-8 text-center text-sm font-medium text-gray-600 dark:text-gray-400">
        Chưa có tài khoản? 
        <a href="register.html" class="font-bold text-[#0056D2] dark:text-blue-400 hover:underline">Đăng ký ngay</a>
      </div>
    </div>
  </div>

  <script>
    const togglePasswordBtn = document.getElementById('toggle-password');
    const passwordInput = document.getElementById('password');
    
    togglePasswordBtn.addEventListener('click', () => {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      togglePasswordBtn.innerHTML = type === 'password' ? '<i class="fa-solid fa-eye"></i>' : '<i class="fa-solid fa-eye-slash"></i>';
    });

    const loginForm = document.getElementById('login-form');
    const submitBtn = document.getElementById('submit-btn');
    const errorBox = document.getElementById('error-message');
    const errorText = document.getElementById('error-text');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      
      if (!email || !password) return;

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> <span>Đang xử lý...</span>';
      errorBox.classList.add('hidden');

      try {
        const response = await fetch('Auth/login.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('coursera_user_session', JSON.stringify({ token: data.token, user: data.user }));

          if (data.user.role === 'admin' || data.user.role === 'teacher') {
            const audio = new Audio('sounds/ping.mp3');
            audio.play().catch(e => console.log(e));
            submitBtn.innerHTML = '<i class="fa-solid fa-check"></i> <span>Đăng nhập thành công!</span>';
            setTimeout(() => {
              window.location.href = 'admin.html';
            }, 1000);
          } else {
            window.location.href = 'coursera-index.html'; 
          }
        } else {
          errorText.innerText = data.message || "Đăng nhập thất bại. Vui lòng thử lại.";
          errorBox.classList.remove('hidden');
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<span>Đăng nhập</span><i class="fa-solid fa-arrow-right text-sm"></i>';
        }
      } catch (error) {
        errorText.innerText = "Lỗi kết nối tới máy chủ. Vui lòng thử lại sau.";
        errorBox.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<span>Đăng nhập</span><i class="fa-solid fa-arrow-right text-sm"></i>';
      }
    });

    async function handleGoogleLogin(response) {
      // Show a status message in the error box
      errorText.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> <span>Đang xác thực với Google...</span>';
      errorBox.className = 'mb-6 p-4 rounded-xl bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 text-sm font-bold flex items-start gap-3 border border-blue-100 dark:border-blue-900/30';
      errorBox.classList.add('hidden');

      try {
        const res = await fetch('Auth/login.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ google_token: response.credential })
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('coursera_user_session', JSON.stringify({ token: data.token, user: data.user }));

          errorText.innerHTML = '<i class="fa-solid fa-check"></i> <span>Đăng nhập thành công! Đang chuyển hướng...</span>';
          errorBox.className = 'mb-6 p-4 rounded-xl bg-green-50 dark:bg-green-900/20 text-green-600 dark:text-green-400 text-sm font-bold flex items-start gap-3 border border-green-100 dark:border-green-900/30';

          if (data.user.role === 'admin' || data.user.role === 'teacher') {
            const audio = new Audio('sounds/ping.mp3');
            audio.play().catch(e => console.log(e));
            setTimeout(() => { window.location.href = 'admin.html'; }, 800);
          } else {
            setTimeout(() => { window.location.href = 'coursera-index.html'; }, 800);
          }
        } else {
          errorText.innerHTML = `<i class="fa-solid fa-circle-exclamation mt-0.5"></i> <span>${data.message || "Đăng nhập Google thất bại."}</span>`;
          errorBox.className = 'mb-6 p-4 rounded-xl bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 text-sm font-bold flex items-start gap-3 border border-red-100 dark:border-red-900/30';
        }
      } catch (error) {
        errorText.innerHTML = `<i class="fa-solid fa-circle-exclamation mt-0.5"></i> <span>Lỗi kết nối tới máy chủ.</span>`;
        errorBox.className = 'mb-6 p-4 rounded-xl bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 text-sm font-bold flex items-start gap-3 border border-red-100 dark:border-red-900/30';
      }
    }
  </script>
</body>
</html>
