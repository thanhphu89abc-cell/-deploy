<!doctype html>
<html lang="vi" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Khôi phục mật khẩu - Coursera Advanced</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: "class" };</script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="coursera-style.css" />
</head>
<body class="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-[#0B0F19] transition-colors duration-300 px-4 font-['Source_Sans_Pro']">

  <div class="max-w-md w-full bg-white dark:bg-slate-900 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] dark:shadow-none border border-gray-100 dark:border-slate-800 p-8 relative overflow-hidden animate-fade-in-up">
    
    <a href="login.html" class="absolute top-6 left-6 text-gray-400 hover:text-[#0056D2] dark:hover:text-blue-400 transition-colors" title="Quay lại đăng nhập">
      <i class="fa-solid fa-arrow-left text-lg"></i>
    </a>

    <div class="text-center mb-6 mt-4 relative z-10">
      <div class="w-16 h-16 mx-auto bg-blue-50 dark:bg-blue-900/30 rounded-full flex items-center justify-center mb-4 border border-blue-100 dark:border-blue-800/50">
        <i id="header-icon" class="fa-solid fa-shield-halved text-2xl text-[#0056D2] dark:text-blue-400"></i>
      </div>
      <h2 id="header-title" class="text-2xl font-black text-gray-900 dark:text-white tracking-tight mb-2">Khôi phục mật khẩu</h2>
      <p id="header-desc" class="text-sm text-gray-500 dark:text-gray-400 font-medium leading-relaxed px-2">
        Nhập địa chỉ email của bạn để nhận mã xác minh.
      </p>
    </div>

    <form id="step-1-form" class="space-y-5 relative z-10 block">
      <div>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i class="fa-regular fa-envelope text-gray-400"></i></div>
          <input id="email-input" type="email" placeholder="student@example.com" class="w-full pl-10 pr-4 py-2.5 bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-[#0056D2]/20 outline-none text-gray-900 dark:text-white" required>
        </div>
      </div>
      <button type="submit" id="btn-step-1" class="w-full bg-[#0056D2] hover:bg-blue-700 text-white font-bold py-2.5 rounded-xl transition-colors shadow-sm">Gửi mã xác nhận</button>
    </form>

    <form id="step-2-form" class="space-y-5 relative z-10 hidden animate-fade">
      <div>
        <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1.5 text-center">Mã gồm 6 chữ số</label>
        <input id="otp-input" type="text" placeholder="123456" maxlength="6" class="w-full px-4 py-3 bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-[#0056D2]/20 outline-none text-gray-900 dark:text-white text-center text-xl font-bold tracking-[0.5em]" required>
      </div>
      <button type="submit" id="btn-step-2" class="w-full bg-[#0056D2] hover:bg-blue-700 text-white font-bold py-2.5 rounded-xl transition-colors shadow-sm">Xác nhận mã</button>
      <div id="otp-error" class="hidden text-center text-sm text-red-500 font-bold">Mã xác nhận không đúng!</div>
    </form>

    <form id="step-3-form" class="space-y-4 relative z-10 hidden animate-fade">
      <div>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i class="fa-solid fa-lock text-gray-400"></i></div>
          <input id="new-password" type="password" placeholder="Mật khẩu mới" class="w-full pl-10 pr-4 py-2.5 bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-[#0056D2]/20 outline-none text-gray-900 dark:text-white" required>
        </div>
      </div>
      <div>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i class="fa-solid fa-shield-halved text-gray-400"></i></div>
          <input id="confirm-password" type="password" placeholder="Nhập lại mật khẩu mới" class="w-full pl-10 pr-4 py-2.5 bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-[#0056D2]/20 outline-none text-gray-900 dark:text-white" required>
        </div>
      </div>
      <button type="submit" id="btn-step-3" class="w-full bg-[#0056D2] hover:bg-blue-700 text-white font-bold py-2.5 rounded-xl transition-colors shadow-sm">Lưu mật khẩu mới</button>
      <div id="pwd-error" class="hidden text-center text-sm text-red-500 font-bold">Mật khẩu không khớp!</div>
    </form>

    <div id="success-msg" class="hidden mt-6 bg-green-50 text-green-700 border border-green-200 dark:bg-green-900/20 dark:text-green-400 dark:border-green-800/50 p-4 rounded-xl text-sm font-medium text-center relative z-10 animate-fade">
      <i class="fa-solid fa-circle-check text-lg block mb-1"></i> Mật khẩu của bạn đã được cập nhật thành công. Đang quay lại trang đăng nhập...
    </div>

    <div class="mt-8 text-center text-sm text-gray-600 dark:text-gray-400 font-medium relative z-10">
      Nhớ mật khẩu rồi? <a href="login.html" class="text-[#0056D2] dark:text-blue-400 font-bold hover:underline">Quay lại Đăng nhập</a>
    </div>
  </div>

  <script>
    // Các phần tử DOM
    const formStep1 = document.getElementById('step-1-form');
    const formStep2 = document.getElementById('step-2-form');
    const formStep3 = document.getElementById('step-3-form');
    const title = document.getElementById('header-title');
    const desc = document.getElementById('header-desc');
    const icon = document.getElementById('header-icon');
    let userEmail = '';
    let resetToken = ''; // Lưu token tạm thời nếu backend trả về để dùng cho bước đổi pass

    // ==========================================
    // BƯỚC 1: Gọi API Gửi Email lấy OTP
    // ==========================================
    formStep1.addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('btn-step-1');
        userEmail = document.getElementById('email-input').value.trim();
        
        btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Đang gửi...`;
        btn.disabled = true;

        try {
            const response = await fetch('Auth/forgot_password.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email: userEmail })
            });

            const result = await response.json();

            if (response.ok) {
                // API xử lý thành công (Đã gửi email) -> Chuyển sang Bước 2
                formStep1.classList.add('hidden');
                formStep2.classList.remove('hidden');
                formStep2.classList.add('block');
                
                title.innerText = 'Nhập mã xác nhận';
                desc.innerHTML = `Mã gồm 6 chữ số đã được gửi tới <b>${userEmail}</b>`;
                icon.className = 'fa-regular fa-envelope-open text-2xl text-[#0056D2] dark:text-blue-400';
            } else {
                // API báo lỗi (VD: Email không tồn tại trong Database)
                alert(result.message || 'Email không tồn tại trong hệ thống.');
                btn.innerHTML = `Gửi mã xác nhận`;
                btn.disabled = false;
            }
        } catch (error) {
            console.error('Lỗi kết nối:', error);
            alert('Không thể kết nối tới Server. Vui lòng kiểm tra lại Backend.');
            btn.innerHTML = `Gửi mã xác nhận`;
            btn.disabled = false;
        }
    });

    // ==========================================
    // BƯỚC 2: Gọi API Xác nhận mã OTP
    // ==========================================
    formStep2.addEventListener('submit', async function(e) {
        e.preventDefault();
        const otp = document.getElementById('otp-input').value.trim();
        const btn = document.getElementById('btn-step-2');
        const err = document.getElementById('otp-error');
        
        err.classList.add('hidden');
        btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Đang kiểm tra...`;
        btn.disabled = true;

        try {
            const response = await fetch('student_api.php/verify-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: userEmail, otp: otp })
            });

            const result = await response.json();

            if (response.ok) {
                // Lưu token backend trả về (nếu có) để dùng cho bước đổi mật khẩu
                if(result.token) resetToken = result.token;

                // OTP đúng -> Chuyển sang Bước 3
                formStep2.classList.remove('block');
                formStep2.classList.add('hidden');
                
                formStep3.classList.remove('hidden');
                formStep3.classList.add('block');
                
                title.innerText = 'Tạo mật khẩu mới';
                desc.innerText = 'Vui lòng đặt mật khẩu mạnh (chứa chữ và số).';
                icon.className = 'fa-solid fa-key text-2xl text-[#0056D2] dark:text-blue-400';
            } else {
                // OTP sai hoặc hết hạn
                err.innerText = result.message || 'Mã xác nhận không đúng hoặc đã hết hạn!';
                err.classList.remove('hidden');
                btn.innerHTML = `Xác nhận mã`;
                btn.disabled = false;
            }
        } catch (error) {
            console.error('Lỗi kết nối:', error);
            err.innerText = 'Lỗi kết nối tới Server.';
            err.classList.remove('hidden');
            btn.innerHTML = `Xác nhận mã`;
            btn.disabled = false;
        }
    });

    // ==========================================
    // BƯỚC 3: Gọi API Lưu mật khẩu mới
    // ==========================================
    formStep3.addEventListener('submit', async function(e) {
        e.preventDefault();
        const pwd1 = document.getElementById('new-password').value;
        const pwd2 = document.getElementById('confirm-password').value;
        const btn = document.getElementById('btn-step-3');
        const err = document.getElementById('pwd-error');
        
        err.classList.add('hidden');

        // Validation Frontend
        if(pwd1 !== pwd2) {
            err.innerText = 'Mật khẩu không khớp!';
            err.classList.remove('hidden');
            return;
        }

        btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Đang lưu...`;
        btn.disabled = true;

        try {
            const response = await fetch('student_api.php/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    email: userEmail, 
                    newPassword: pwd1,
                    token: resetToken // Gửi kèm token bảo mật nếu backend yêu cầu
                })
            });

            if (response.ok) {
                // Đổi mật khẩu thành công
                formStep3.classList.remove('block');
                formStep3.classList.add('hidden');
                document.getElementById('success-msg').classList.remove('hidden');
                
                // Chuyển hướng về đăng nhập
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } else {
                const result = await response.json();
                err.innerText = result.message || 'Có lỗi xảy ra khi đổi mật khẩu.';
                err.classList.remove('hidden');
                btn.innerHTML = `Lưu mật khẩu mới`;
                btn.disabled = false;
            }
        } catch (error) {
            console.error('Lỗi kết nối:', error);
            err.innerText = 'Lỗi kết nối tới Server.';
            err.classList.remove('hidden');
            btn.innerHTML = `Lưu mật khẩu mới`;
            btn.disabled = false;
        }
    });
  </script>

</body>
</html>
